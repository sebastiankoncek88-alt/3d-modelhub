<!DOCTYPE html>
<html>
<head>
  <title>3D ModelHub</title>
  <script src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js" type="module"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Inter, sans-serif; }
    body { background: #141416; color: #f0f0f0; }
    nav { background: #1c1c1e; height: 52px; display: flex; align-items: center; justify-content: space-between; padding: 0 40px; }
    .logo { font-size: 16px; font-weight: 500; }
    .nav-links a { color: #6b6b6b; text-decoration: none; font-size: 12px; margin-left: 24px; }
    .hero { padding: 60px 40px 20px; }
    .hero h1 { font-size: 48px; font-weight: 500; margin-bottom: 12px; }
    .hero p { font-size: 16px; color: #6b6b6b; margin-bottom: 24px; }
    .search-row { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
    .hero input { background: #1c1c1e; border: 1px solid #3a3a3c; border-radius: 8px; padding: 8px 16px; color: #f0f0f0; font-size: 12px; width: 320px; }
    .hero button.search-btn { background: #3a3a3c; border: none; border-radius: 8px; padding: 8px 16px; color: #f0f0f0; font-size: 12px; cursor: pointer; }
    .filters { display: flex; gap: 8px; padding: 0 40px 20px; }
    .filter { font-size: 11px; padding: 4px 12px; border-radius: 99px; cursor: pointer; border: 1px solid #3a3a3c; color: #6b6b6b; background: transparent; }
    .filter.active { background: #f0f0f0; color: #141416; border-color: #f0f0f0; }
    .models { padding: 0 40px 40px; }
    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
    .card { background: #242424; border: 1px solid #2c2c2e; border-radius: 8px; overflow: hidden; cursor: pointer; }
    .card:hover { border-color: #505050; }
    .card-img { height: 160px; overflow: hidden; background: #141416; }
    .card-img img { width: 100%; height: 100%; object-fit: contain; }
    .card-info { padding: 12px; }
    .card-info h3 { font-size: 13px; font-weight: 500; color: #e0e0e0; margin-bottom: 4px; }
    .card-info p { font-size: 11px; color: #505050; margin-bottom: 8px; }
    .badge { font-size: 9px; background: #3a3a3c; color: #d0d0d0; border-radius: 4px; padding: 2px 6px; margin-bottom: 6px; display: inline-block; }
    .card-footer { display: flex; align-items: center; justify-content: space-between; }
    .format { font-size: 11px; color: #505050; }
    .card-footer a { font-size: 11px; color: #d0d0d0; border: 1px solid #3a3a3c; border-radius: 4px; padding: 4px 10px; text-decoration: none; }
    .card-footer a:hover { background: #3a3a3c; }
    footer { background: #1c1c1e; padding: 20px 40px; text-align: center; color: #505050; font-size: 12px; margin-top: 40px; }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0d0d0f; z-index: 100; }
    .modal.open { display: flex; }
    .modal-left { flex: 1; height: 100vh; background: #141416; }
    .modal-left model-viewer { width: 100%; height: 100%; }
