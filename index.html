<script>
    window.addEventListener('DOMContentLoaded', function() {
      const params = new URLSearchParams(window.location.search);
      const filter = params.get('filter');
      if(filter) {
        const btn = document.querySelector('.filter[onclick*="' + filter + '"]');
        if(btn) filterCards(filter, btn);
      }
    });

    function filterCards(cat, btn) {
      document.querySelectorAll('.filter').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.querySelectorAll('.card').forEach(card => {
        card.style.display = (cat === 'all' || card.dataset.category === cat) ? 'block' : 'none';
      });
    }

    function searchCards() {
      const q = document.getElementById('searchInput').value.toLowerCase();
      document.querySelectorAll('.card').forEach(card => {
        card.style.display = card.dataset.name.includes(q) ? 'block' : 'none';
      });
    }

    function openModal(name, file, glb, img, downloads, format) {
      document.getElementById('modal-title').textContent = name;
      document.getElementById('modal-download').href = file;
      document.getElementById('modal-downloads').textContent = downloads;
      document.getElementById('modal-format').textContent = format;
      const viewer = document.getElementById('modal-viewer');
      if(glb) {
        document.getElementById('modal-hint').textContent = 'Drag to rotate • Scroll to zoom';
        viewer.innerHTML = '<model-viewer src="' + glb + '" auto-rotate camera-controls style="width:100%;height:100vh;background:#141416;"></model-viewer>';
      } else {
        document.getElementById('modal-hint').textContent = '3D preview not available for ZIP format';
        viewer.innerHTML = '<div class="no-glb"><img src="' + img + '"></div>';
      }
      document.getElementById('modal').classList.add('open');
    }

    function closeModal() {
      document.getElementById('modal').classList.remove('open');
      setTimeout(function() {
        document.getElementById('modal-viewer').innerHTML = '';
      }, 100);
      history.replaceState(null, '', 'index.html');
    }
  </script>
