<!DOCTYPE html>
<html>
<head>
  <title>3D ModelHub</title>
</head>
<body>

  <nav>
    <div class="logo">3D ModelHub</div>
    <div class="nav-links">
      <a href="#">Models</a>
      <a href="#">Categories</a>
      <a href="#">About</a>
    </div>
  </nav>

  <section class="hero">
    <h1>Download Free 3D Models</h1>
    <p>Free 3D assets for every project</p>
    <input type="text" placeholder="Search for a model...">
    <button>Search</button>
  </section>

  <section class="models">
    <div class="grid">

      <div class="card">
        <div class="card-img"></div>
        <div class="card-info">
          <span class="badge">FREE</span>
          <h3>Cyberpunk Car</h3>
          <p>1.2k downloads</p>
          <div class="card-footer">
            <span class="format">.OBJ</span>
            <a href="#" download>Download</a>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-img"></div>
        <div class="card-info">
          <span class="badge">FREE</span>
          <h3>Space Helmet</h3>
          <p>800 downloads</p>
          <div class="card-footer">
            <span class="format">.FBX</span>
            <a href="#" download>Download</a>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-img"></div>
        <div class="card-info">
          <span class="badge">FREE</span>
          <h3>Samurai Sword</h3>
          <p>2.1k downloads</p>
          <div class="card-footer">
            <span class="format">.BLEND</span>
            <a href="#" download>Download</a>
          </div>
        </div>
      </div>

    </div>
  </section>

</body>
</html>
